<section class="section"><div class="container"><div class="shop-head"><div><span class="badge">All categories</span><h1>Pharmacy Shop</h1><p class="muted">Browse supplements, medicines, herbs, beauty and baby care.</p></div><div class="filters"><input [(ngModel)]="q" placeholder="Search products"><button class="btn btn-primary" (click)="load()">Search</button></div></div><p *ngIf="loading">Loading...</p><div class="product-grid"><article class="product card" *ngFor="let p of products"><a [routerLink]="['/products',p.id]" class="pic">{{p.name.slice(0,1)}}</a><p class="muted">{{p.category_name}}</p><h3><a [routerLink]="['/products',p.id]">{{p.name}}</a></h3><div><span class="price">{{(p.sale_price || p.price) | currency}}</span> <span class="old" *ngIf="p.sale_price">{{p.price | currency}}</span></div><button class="btn btn-primary" (click)="add(p)">Add to cart</button></article></div></div></section>
